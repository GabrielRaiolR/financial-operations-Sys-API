spring.application.name=financial-operations-system

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finops}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Em produ??o n?o use ddl-auto=update sem Flyway (ver MANUAL_IMPLEMENTACAO.md)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Basic Auth: APP_SECURITY_USER / APP_SECURITY_PASSWORD (ver SecurityConfiguration.java; padrao admin / finops_pass)
app.jwt.secret=${JWT_SECRET:dev_secret_must_be_at_least_32_chars!!}
app.jwt.expiration-minutes=1440