spring.application.name=financial-operations-system

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finops}
spring.datasource.username=${DB_USERNAME:finops_user}
spring.datasource.password=${DB_PASSWORD:finops_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%t] [%X{correlationId:-}] %logger{36} - %msg%n

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Basic Auth: APP_SECURITY_USER / APP_SECURITY_PASSWORD (ver SecurityConfiguration.java; padrao admin / finops_pass)
app.jwt.secret=${JWT_SECRET:dev_secret_must_be_at_least_32_chars!!}
app.jwt.expiration-minutes=1440

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=finops
spring.rabbitmq.password=finops_dev_only