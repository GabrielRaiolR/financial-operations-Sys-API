spring.application.name=financial-operations-system

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finops}
spring.datasource.username=${DB_USERNAME:finops_user}
spring.datasource.password=${DB_PASSWORD:finops_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%t] [%X{correlationId:-}] %logger{36} - %msg%n

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Basic Auth: APP_SECURITY_USER / APP_SECURITY_PASSWORD (ver SecurityConfiguration.java; padrao admin / finops_pass)
app.jwt.secret=${JWT_SECRET:dev_secret_must_be_at_least_32_chars!!}
app.jwt.expiration-minutes=1440

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=finops
spring.rabbitmq.password=finops_dev_only

spring.cache.type=caffeine
# fxHistory removed: time-series is not cached (see FrankfurterExchangeRateClient.fetchTimeSeries).
spring.cache.cache-names=fxRates
spring.cache.caffeine.spec=expireAfterWrite=10m

# Host api.frankfurter.app redireciona de forma que /v1/... vira /v1/v1/... (404). Usar .dev + /v1.
app.fx.frankfurter-base-url=https://api.frankfurter.dev/v1

# Circuit breaker
resilience4j.circuitbreaker.instances.frankfurter.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.frankfurter.sliding-window-size=10
resilience4j.circuitbreaker.instances.frankfurter.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.frankfurter.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.frankfurter.permitted-number-of-calls-in-half-open-state=3

# Retry (GET idempotente ? poucas tentativas)
resilience4j.retry.instances.frankfurter.max-attempts=3
resilience4j.retry.instances.frankfurter.wait-duration=300ms